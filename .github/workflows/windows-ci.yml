name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-publish:
    name: Build, test, and publish desktop
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build launcher
        run: dotnet build desktop/RPGMTransLauncher/RPGMTransLauncher.csproj -c Release

      - name: Publish desktop bundle
        run: npm run desktop:publish

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: RPGMTransLauncher-win-x64
          path: desktop/RPGMTransLauncher/bin/Release/net8.0-windows/win-x64/publish/**
          if-no-files-found: error
